<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

 <div class="page">

    <section class="left-panel">

        <div class="left-content">

            <h1>
                Seja Bem-Vindo
            </h1>

            <div class="hero-circle"></div>

        </div>

    </section>

    <section class="right-panel">

        <div class="login-container">

            <h2 class="login-title">
                Entrar com login
            </h2>

            <form id="loginForm">

                <div class="form-group">
                    <input
                        class="form-input"
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    >
                </div>

                <div class="form-group">
                    <input
                        class="form-input"
                        type="password"
                        id="password"
                        placeholder="Senha"
                        required
                    >
                </div>

                <div class="divider">
                    <span>ou</span>
                </div>

                <button type="button" class="social-button">

                    <div class="social-icon"></div>

                    <span class="social-text">
                        Continuar com o Google
                    </span>

                </button>

                <button type="button" class="social-button">

                    <div class="social-icon"></div>

                    <span class="social-text">
                        Continuar com Apple
                    </span>

                </button>

                <div class="register-link">
                    Não tem uma conta?
                    <a href="#">
                        Cadastre-se agora
                    </a>
                </div>

                <button class="login-button" type="submit">
                    Logar
                </button>

            </form>

        </div>

    </section>

</div>

    <script src="js/login.js"></script>

</body>
</html>
