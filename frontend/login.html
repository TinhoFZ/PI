<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Entrar
        </button>

    </form>

    <p>
        Não possui conta?
        <a href="register.html">Cadastrar</a>
    </p>

    <script src="js/login.js"></script>

</body>
</html>
