<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <title>STOG Map</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    >

    <link
        rel="stylesheet"
        href="css/map.css"
    >

</head>
<body>
<header class="header">
    <div class="header-container">

        <div class="logo">STOG</div>

        <nav class="nav">
            <a href="map.html">Mapa</a>
            <a href="diary.html">Diário</a>
            <a href="marketplace.html">Mercado</a>
            <a href="profile.html">Perfil</a>
        </nav>

        <button class="login-btn">Entrar</button>

    </div>
</header>

<main class="main">

    <!-- MAPA / CONTEÚDO PRINCIPAL -->
    <section class="content" aria-label="Mapa do mundo">

        <div class="content-map">
            <div id="map"></div>

            <div id="questPanel">
                <h2>Quests Ativas</h2>
                <div id="questList"></div>
            </div>
        </div>

        <div class="content-footer">
            <span class="content-footer-info">Região: Floresta dos Segredos · Explorado: 34%</span>
            <div class="content-footer-actions">
                <button class="btn-secondary">Explorar</button>
                <button class="btn-secondary">Inventário</button>
            </div>
        </div>

    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- Atividades -->
        <div class="activity-panel">
            <div class="panel-header">
                <h2 class="panel-title">Atividades</h2>
                <button class="add-button" aria-label="Nova atividade">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
            </div>

            <div class="activities-list">
                <button class="activity">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="activity-label">Missão Diária</span>
                    <svg class="activity-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>

                <button class="activity">
                    <svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 008 20C19 20 22 3 22 3c-1 2-8 2-11 5a13.24 13.24 0 014-6c-2 1-3 2-3 4a12 12 0 003-2z"/></svg>
                    <span class="activity-label">Exploração</span>
                    <svg class="activity-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>

                <button class="activity">
                    <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
                    <span class="activity-label">Coleta de Itens</span>
                    <svg class="activity-arrow" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                </button>
            </div>
        </div>

        <!-- Stats rápidos -->
        <div class="stats-panel">
            <div class="stat-item">
                <span class="stat-value">14</span>
                <span class="stat-label">Missões</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">4</span>
                <span class="stat-label">Habilidades</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">320</span>
                <span class="stat-label">XP Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">Nv. 3</span>
                <span class="stat-label">Nível</span>
            </div>
        </div>

        <!-- Mystery box -->
        <div class="mystery-box" role="button" tabindex="0" aria-label="Caixa misteriosa — clique para revelar">
            <span class="mystery-icon">✦</span>
            <div class="mystery-title">Caixa Misteriosa</div>
            <p class="mystery-text">Algo especial te aguarda. Explore o mundo para descobrir o que está escondido aqui...</p>
        </div>

    </aside>

</main>


    <a href="quests.html">
        Minhas Quests
    </a>
    
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script src="js/config/api.js"></script>

    <script src="js/map/map.js"></script>

    <script src="js/utils/icons.js"></script>


    <script src="js/services/quests.js"></script>
    <script src="js/services/treasures.js"></script>

    <script src="js/map/zones.js"></script>
    <script src="js/map/locations.js"></script>
    <script src="js/map/treasures.js"></script>

    <script src="js/ui/questsPanel.js"></script>

    <script>
        loadZones();
        loadLocations();
        loadTreasures();
        loadQuestPanel();
    </script>

</body>
</html>
