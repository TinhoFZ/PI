<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
</head>
<body>

    <h1>Cadastro</h1>

    <form id="registerForm">
        <input
            type="text"
            id="name"
            placeholder="Nome"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Senha"
            required
        >

        <button type="submit">
            Cadastrar
        </button>
    </form>

    <p>
        Já possui conta?
        <a href="login.html">Login</a>
    </p>

    <script src="js/register.js"></script>

</body>
</html>
